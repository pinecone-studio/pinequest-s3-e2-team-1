fragment AttemptSummaryFields on AttemptSummary {
  attemptId
  testId
  title
  studentId
  studentName
  status
  score
  maxScore
  percentage
  startedAt
  submittedAt
  monitoring {
    ...AttemptMonitoringSummaryFields
  }
  result {
    ...AttemptResultSummaryFields
  }
  feedback {
    ...AttemptFeedbackFields
  }
  answerReview {
    questionId
    prompt
    competency
    questionType
    selectedOptionId
    selectedAnswerText
    correctAnswerText
    points
    responseGuide
    dwellMs
    answerChangeCount
  }
}
