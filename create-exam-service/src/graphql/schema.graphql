enum ExamType {
  PERIODIC_1
  PERIODIC_2
  MIDTERM
  FINALTERM
  PRACTICE
}

enum ExamStatus {
  DRAFT
  GENERATING
  FAILED
  PUBLISHED
}

enum Difficulty {
  EASY
  MEDIUM
  HARD
}

enum QuestionFormat {
  SINGLE_CHOICE
  MULTIPLE_CHOICE
  MATCHING
  FILL_IN
  WRITTEN
}

input DifficultyDistributionInput {
  easy: Int!
  medium: Int!
  hard: Int!
}

input DifficultyPointsInput {
  easyPoints: Int
  mediumPoints: Int
  hardPoints: Int
}

input FormatDistributionInput {
  singleChoice: Int!
  multipleChoice: Int!
  matching: Int!
  fillIn: Int!
  written: Int!
}

input ExamGenerationInput {
  gradeClass: String!
  subject: String!
  examType: ExamType!
  topicScope: String!
  examContent: String!
  examDate: String!
  examTime: String!
  durationMinutes: Int!
  totalQuestionCount: Int!
  difficultyDistribution: DifficultyDistributionInput!
  difficultyPoints: DifficultyPointsInput
  formatDistribution: FormatDistributionInput
}

input EditableQuestionInput {
  id: ID!
  text: String!
  format: QuestionFormat!
  difficulty: Difficulty!
  options: [String!]
  correctAnswer: String
  explanation: String
}

input SaveExamInput {
  examId: ID
  status: ExamStatus!
  errorLog: String
  generation: ExamGenerationInput!
  questions: [EditableQuestionInput!]!
}

type GeneratedQuestion {
  id: ID!
  text: String!
  format: QuestionFormat!
  difficulty: Difficulty!
  options: [String!]
  correctAnswer: String
  explanation: String
}

type ExamGenerationResult {
  examId: ID!
  status: ExamStatus!
  errorLog: String
  createdAt: String!
  updatedAt: String!
  questions: [GeneratedQuestion!]!
}

type SaveExamPayload {
  examId: ID!
  status: ExamStatus!
  errorLog: String
  createdAt: String!
  updatedAt: String!
}

enum MathExamQuestionType {
  MCQ
  MATH
}

input NewMathExamGeneratorMetaInput {
  difficulty: String
  topics: String
  sourceContext: String
}

input NewMathExamSessionMetaInput {
  grade: Int
  groupClass: String
  examType: String
  subject: String
  topics: [String!]
  examDate: String
  startTime: String
  endTime: String
  durationMinutes: Int
  mixQuestions: Boolean
  withVariants: Boolean
  variantCount: Int
  description: String
}

input NewMathExamQuestionInput {
  id: ID
  type: MathExamQuestionType!
  prompt: String!
  points: Int!
  imageAlt: String
  imageDataUrl: String
  options: [String!]
  correctOption: Int
  responseGuide: String
  answerLatex: String
}

input SaveNewMathExamInput {
  examId: ID
  title: String!
  mcqCount: Int!
  mathCount: Int!
  totalPoints: Int!
  generator: NewMathExamGeneratorMetaInput
  sessionMeta: NewMathExamSessionMetaInput
  questions: [NewMathExamQuestionInput!]!
}

type SaveNewMathExamPayload {
  examId: ID!
  title: String!
  createdAt: String!
  updatedAt: String!
}

type Query {
  health: String!
  listNewMathExams(limit: Int = 50): [NewMathExamSummary!]!
  getNewMathExam(examId: ID!): NewMathExam
}

type Mutation {
  generateExamQuestions(input: ExamGenerationInput!): ExamGenerationResult!
  saveExam(input: SaveExamInput!): SaveExamPayload!
  saveNewMathExam(input: SaveNewMathExamInput!): SaveNewMathExamPayload!
}

type NewMathExamSummary {
  examId: ID!
  title: String!
  updatedAt: String!
}

type NewMathExamGeneratorMeta {
  difficulty: String
  topics: String
  sourceContext: String
}

type NewMathExamSessionMeta {
  grade: Int
  groupClass: String
  examType: String
  subject: String
  topics: [String!]
  examDate: String
  startTime: String
  endTime: String
  durationMinutes: Int
  mixQuestions: Boolean
  withVariants: Boolean
  variantCount: Int
  description: String
}

type NewMathExamQuestion {
  id: ID!
  type: MathExamQuestionType!
  prompt: String!
  points: Int!
  imageAlt: String
  imageDataUrl: String
  options: [String!]
  correctOption: Int
  responseGuide: String
  answerLatex: String
}

type NewMathExam {
  examId: ID!
  title: String!
  mcqCount: Int!
  mathCount: Int!
  totalPoints: Int!
  generator: NewMathExamGeneratorMeta
  sessionMeta: NewMathExamSessionMeta
  questions: [NewMathExamQuestion!]!
  createdAt: String!
  updatedAt: String!
}
